<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lab 5</title>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>

    <style>
        .banner-img{
            height: 200px;
            object-fit: cover;
            filter: brightness(50%);
        }
        
        
    </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><b>ACHIEVE-ONLINE</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Log In</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Sign Up</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="card text-bg-dark border-0 rounded-0">
        <img src="https://www.shutterstock.com/image-vector/pixel-golden-trophy-cartoon-retro-260nw-2499654889.jpg" class="card-img banner-img" alt="Trophie backgroundxs">
        <div class="card-img-overlay d-flex flex-column justify-content-center">
            <h1 class="card-title text-center">ACHIEVEMENTS ONLINE</h5>
            <p class="card-text text-center">Access All your Gaming Acheivements and trophies From Mobile, Console, PC Games.</p>
        </div>
    </div>

    
    <div class="container p-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card reg-card p-4 shadow">
                <h3 class="text-center mb-4">Register Your Collection</h3>
                <form id="myForm">
                
                    <div class="row">
                        <div class="col-6 mb-3">
                            <input type="text" id="fname" class="form-control" placeholder="First Name" required>
                        </div>
                        <div class="col-6 mb-3">
                            <input type="text" id="lname" class="form-control" placeholder="Last Name" required>
                        </div>
                        <div class="col-12 mb-3">
                            <input type="email" id="email" class="form-control" placeholder="E-mail" required>
                        </div>
                        <div class="col-12 mb-3">
                            <input type="password" id="pw" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="col-12 mb-4">
                            <input type="date" id="db" class="form-control" placeholder="Date of Birth" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" class="btn btn-secondary" onclick="submitForm()">Submit</button>
                        </div>
                    </div>
                
                </form>
                <div id="displayResult" class="mt-4">
                    
                </div>
                </div>
            </div> 
        </div>
    </div>


    <script>
        function submitForm(){
            

            var fname = document.getElementById('fname').value;
            var lname = document.getElementById('lname').value;
            var email = document.getElementById('email').value;
            var password = document.getElementById('pw').value;
            var date = document.getElementById('db').value;

            var display = document.getElementById('displayResult');

            if(fname == "" || lname == "" || email == "" || password == "" || date == ""){
                display.innerHTML = '<div class = "alert alert-danger"><strong>Error!</strong> Please fill out all fields.</div>';
            }else if(password.includes("!") == false && password.includes("?") == false){
                display.innerHTML = '<div class="alert alert-danger"><strong>Password Error!</strong> Password Musrt contain a "!" or "?"</div>'
            }else{
                var userObject = {
                    firstName: fname,
                    lastName: lname,
                    emailAdd: email,
                    password: password,
                    dob: date
                };
            
            
            var hidePassword = '*'.repeat(userObject.password.length);

            var output = '<div class="alert alert-success">Registration Successful!</div>' +
                         '<p><b>Name:</b> ' + userObject.firstName + ' ' + userObject.lastName + '</p>' +
                         '<p><b>Email:</b> ' + userObject.emailAdd + '</p>' +
                         '<p><b>Password:</b> ' + hidePassword + '</p>' +
                         '<p><b>DOB:</b> ' + userObject.dob + '</p>';

            display.innerHTML = output;

            }
        };
    </script>
    
</body>
</html>
