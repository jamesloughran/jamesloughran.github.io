<!DOCTYPE html>
<html lang="en">

<head>
    <title>Lab 6</title>

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>


</head>

<body class="p-3 mb-2 bg-secondary-subtle text-secondary-emphasis">


    <div class="text-bg-subtle border-0 rounded-0 mb-5">
            <h1 id="header" class="card-title text-center">World Of Computer</h5>
            <p id="header-info" class="card-text text-center">Learn More About Your Computer</p>
        </div>
    </div>


    <div class="container card shadow p-4">
        <div class="row align-items-center">
            <div class="text-center mb-4 mb-md-0 col-12 col-md-6">
                <img id="cat-photo"
                    src="https://img.freepik.com/premium-vector/desktop-computer-concept-illustration_114360-16232.jpg?semt=ais_hybrid&w=740&q=80"
                    class="img-fluid card shadow" alt="Cat Photo">
            </div>

            <div class="container py-5 text-center col-12 col-md-6">
                <div class="card shadow">
                    <div class="card-body p-7">
                        <table class="table table-striped table-hover mb-0">
                            <thead>
                                <tr>
                                    <th scope="col" style="width: 15%">factId</th>
                                    <th scope="col" class="text-start">facts</th>
                                </tr>
                            </thead>
                            <tbody id="fact-table"></tbody>
                        </table>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <button id="fetch-btn" onclick="getCatData()" class="btn btn-danger btn-lg mb-5 ">
                        Purrceed
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        async function getCatData() {
            try {
                var reponse = await fetch('https://brianobruno.github.io/cats.json', {
                    method: 'GET'
                });

                var data = await reponse.json();

                var sortFacts = data.facts.sort(function (a, b) {
                    return a.factId - b.factId;
                });

                var catHeader = document.getElementById('header');
                catHeader.innerText = "WORLD OF CATS";
                var catHeaderInfo = document.getElementById('header-info');
                catHeaderInfo.innerText = "LIED!!, This is Cat Facts!";

                var catImg = document.getElementById('cat-photo');
                catImg.src = data.catPhoto;

                var tbody = document.getElementById('fact-table');
                tbody.innerHTML = '';

                sortFacts.forEach(function (item) {
                    var row = '<tr>' +
                        '<td class="fw-bold">' + item.factId + '</td>' +
                        '<td class="text-start">' + item.text + '</td>' +
                        '</tr>';

                    tbody.innerHTML += row;
                });

            }
            catch (error) {
                console.error('Error:', error);
            }
        }


    </script>

</body>

</html>
